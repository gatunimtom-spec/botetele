<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — VIP Bot Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body>
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">👑</span>
      <div>
        <div class="sidebar-title">VIP Bot</div>
        <div class="sidebar-sub">Admin Panel</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-section="overview">
        <span class="nav-icon">📊</span> Overview
      </a>
      <a href="#" class="nav-item" data-section="leads">
        <span class="nav-icon">👥</span> Leads
      </a>
      <a href="#" class="nav-item" data-section="messages">
        <span class="nav-icon">💬</span> Mensagens
      </a>
      <a href="#" class="nav-item" data-section="payments">
        <span class="nav-icon">💳</span> Pagamentos
      </a>
      <a href="#" class="nav-item" data-section="vip">
        <span class="nav-icon">⭐</span> VIP
      </a>
      <a href="#" class="nav-item" data-section="broadcast">
        <span class="nav-icon">📢</span> Disparo
      </a>
      <a href="#" class="nav-item" data-section="config">
        <span class="nav-icon">⚙️</span> Configurações
      </a>
    </nav>

    <div class="sidebar-footer">
      <button id="logoutBtn" class="logout-btn">🚪 Sair</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main">
    <!-- TOPBAR -->
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <div class="topbar-title" id="pageTitle">Overview</div>
      <div class="topbar-actions">
        <button class="btn btn-sm btn-ghost" id="refreshBtn">🔄 Atualizar</button>
        <div class="status-dot" id="statusDot" title="API Online"></div>
      </div>
    </header>

    <!-- CONTEÚDO -->
    <div class="content" id="content">
      <!-- Seções injetadas via JS -->
    </div>
  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box" id="modalBox">
      <div class="modal-header">
        <span id="modalTitle">Detalhes</span>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
